<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Exam Portal</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      text-align: center;
      padding: 40px;
    }

    h1 {
      color: #333;
    }

    .container {
      margin-top: 40px;
    }

    .btn {
      display: block;
      width: 300px;
      margin: 15px auto;
      padding: 15px;
      font-size: 18px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      text-decoration: none;
    }

    .btn:hover {
      background: #0056b3;
    }

    .note {
      margin-top: 30px;
      color: #666;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <h1>College Examination Portal</h1>
  <p>Select your exam below</p>

  <div class="container">
    <a class="btn" href="https://docs.google.com/forms/d/e/1FAIpQLSeLATTNnAiI912-GWCg7mUhLFXwVT3HUjjA2kffa7_EJ8MmVg/viewform?usp=header" target="_self">
      Java MCQ Exam
    </a>

    <a class="btn" href="https://docs.google.com/forms/d/e/1FAIpQLSc-TZ1pYb0npYN6BJqw0Z5It5tNjLglM61kB97JPUR_kNsdjw/viewform?usp=publish-editor" target="_self">
      PHP MCQ Exam
    </a>

    <a class="btn" href="https://docs.google.com/forms/d/FORM_ID_3" target="_self">
      Python MCQ Exam
    </a>
    
  <a class="btn" href="https://chatgpt.com/" target="_self">
      Test
    </a>
    
  </div>

  <div class="note">
    Click only your assigned exam. Do not navigate elsewhere.
  </div>

</body>
</html>
